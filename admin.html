<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M.I.T.Y REUNION — 관리자</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithCustomToken, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    const app = initializeApp({
      apiKey: "AIzaSyDiJwsuZuItXz4Cs0ZondQ2rfjcWBpIN3Y",
      authDomain: "mity-reunion.firebaseapp.com",
      projectId: "mity-reunion",
    });
    const db = getFirestore(app);
    const auth = getAuth(app);
    window._db = db;
    window._fs = { doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs };
    window._adminAuth = auth;
    window._adminAuthLib = { signInWithCustomToken, onAuthStateChanged, signOut };
  </script>
  <style>
    :root {
      --black: #0a0a0a; --white: #fff; --red: #cc2200;
      --border: rgba(255,255,255,0.15); --muted: rgba(255,255,255,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; }

    /* ── 로그인 ── */
    #pageLogin { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrap { width: 320px; display: flex; flex-direction: column; gap: 12px; }
    .login-wrap h1 { font-size: 1rem; font-weight: 900; letter-spacing: 0.2em; text-align: center; margin-bottom: 12px; }
    .login-wrap input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 4px; color: #fff; font-family: inherit; font-size: 0.9rem; outline: none; }
    .login-wrap input:focus { border-color: rgba(255,255,255,0.4); }
    .btn-login { padding: 13px; background: var(--white); color: var(--black); border: none; border-radius: 4px; font-family: inherit; font-weight: 900; font-size: 0.9rem; cursor: pointer; box-shadow: 3px 3px 0 var(--red); }
    .login-error { font-size: 0.78rem; color: #ff6b6b; text-align: center; display: none; }

    /* ── 대시보드 ── */
    #pageDashboard { display: none; flex-direction: column; min-height: 100vh; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--black); z-index: 10; flex-wrap: wrap; gap: 8px; }
    header h1 { font-size: 0.9rem; font-weight: 900; letter-spacing: 0.15em; }
    header h1 a { color: inherit; text-decoration: none; }
    .stats { display: flex; gap: 20px; }
    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      .stats { order: 3; width: 100%; justify-content: center; border-top: 1px solid var(--border); padding-top: 10px; }
    }
    .stat { text-align: center; }
    .stat-val { font-size: 1.2rem; font-weight: 900; }
    .stat-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; }
    .btn-logout-admin { font-size: 0.75rem; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 4px; padding: 6px 14px; cursor: pointer; font-family: inherit; }

    .dashboard-body { display: flex; flex: 1; gap: 0; }

    /* 좌석 맵 */
    .seat-area {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 0 24px; gap: 16px; overflow: hidden;
    }
    .seat-scroll-wrap {
      width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent;
    }
    .seat-scroll-wrap::-webkit-scrollbar { height: 4px; }
    .seat-scroll-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    .seat-inner {
      display: flex; flex-direction: column; gap: 6px;
      align-items: center;
      min-width: max-content; width: max-content;
      margin: 0 auto; padding: 4px 28px 8px;
    }
    .stage-label {
      width: 100%; text-align: center;
      font-size: 0.65rem; letter-spacing: 0.3em; color: var(--muted);
      padding: 8px; border: 1px solid var(--border); border-radius: 4px;
    }
    .seat-map { display: flex; flex-direction: column; gap: 5px; align-items: flex-start; }
    .seat-row { display: flex; align-items: center; gap: 5px; }
    .seat-aisle { width: 22px; text-align: center; font-size: 0.55rem; color: var(--muted); font-weight: 700; flex-shrink: 0; }
    .seat {
      width: 26px; height: 22px; border-radius: 3px; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1);
      transition: transform 0.1s, border-color 0.1s; font-size: 0; flex-shrink: 0;
    }
    .seat:hover { transform: scale(1.12); border-color: rgba(255,255,255,0.6); }
    .seat.booked   { background: rgba(204,34,0,0.55); border-color: #cc2200; }
    .seat.blocked  { background: rgba(251,146,60,0.55); border-color: #f97316; }
    .seat.wc-seat  { background: rgba(56,189,248,0.2); border-color: rgba(56,189,248,0.5); }
    .seat.checked-in { background: rgba(74,222,128,0.45) !important; border-color: rgba(74,222,128,0.8) !important; }
    .seat.search-match { outline: 2px solid #facc15; outline-offset: 2px; }
    .seat.selected-info { outline: 2px solid #fff; outline-offset: 2px; }

    .search-wrap { display: flex; gap: 8px; padding: 0 20px; width: 100%; max-width: 480px; }
    .search-input { flex: 1; padding: 9px 14px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 4px; color: #fff; font-family: inherit; font-size: 0.85rem; outline: none; }
    .search-input:focus { border-color: rgba(255,255,255,0.4); }
    .search-input::placeholder { color: rgba(255,255,255,0.3); }
    .btn-search { padding: 9px 18px; background: rgba(255,255,255,0.1); border: 1px solid var(--border); border-radius: 4px; color: #fff; font-family: inherit; font-size: 0.82rem; cursor: pointer; white-space: nowrap; }
    .btn-search:hover { background: rgba(255,255,255,0.18); }

    .legend { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; padding: 0 20px; }
    .leg { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--muted); }
    .leg-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

    /* 정보 패널 */
    .info-panel { width: 280px; flex-shrink: 0; border-left: 1px solid var(--border); padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
    .info-panel-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.15em; color: var(--muted); }
    .info-empty { font-size: 0.82rem; color: rgba(255,255,255,0.3); }
    .info-seat-id { font-size: 1.1rem; font-weight: 900; }
    .info-row { display: flex; flex-direction: column; gap: 3px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .info-key { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--muted); }
    .info-val { font-size: 0.85rem; word-break: break-all; }
    .btn-block   { width: 100%; padding: 11px; background: rgba(251,146,60,0.2); color: #f97316; border: 1px solid #f97316; border-radius: 4px; font-family: inherit; font-size: 0.85rem; font-weight: 700; cursor: pointer; margin-top: 4px; transition: background 0.15s; }
    .btn-block:hover { background: rgba(251,146,60,0.35); }
    .btn-unblock { width: 100%; padding: 11px; background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); border-radius: 4px; font-family: inherit; font-size: 0.85rem; font-weight: 700; cursor: pointer; margin-top: 4px; transition: background 0.15s; }
    .btn-unblock:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .input-target { width: 100%; padding: 10px 12px; margin-bottom: 8px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 4px; color: #fff; font-family: inherit; font-size: 0.85rem; outline: none; }
    .input-target:focus { border-color: rgba(255,255,255,0.4); }
    .input-target::placeholder { color: rgba(255,255,255,0.3); }
    .checkin-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .checkin-row input[type=checkbox] { width: 17px; height: 17px; accent-color: #4ade80; cursor: pointer; flex-shrink: 0; }
    .checkin-row span { font-size: 0.85rem; }
    .cancel-section { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 12px; }
    .cancel-label { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.1em; }
    .btn-cancel-booking { width: 100%; padding: 11px; background: rgba(204,34,0,0.15); color: #ff6b6b; border: 1px solid rgba(204,34,0,0.5); border-radius: 4px; font-family: inherit; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .btn-cancel-booking:not(:disabled):hover { background: rgba(204,34,0,0.3); }
    .btn-cancel-booking:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-history { width: 100%; padding: 9px 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 4px; color: var(--muted); font-family: inherit; font-size: 0.78rem; cursor: pointer; text-align: left; margin-top: 12px; }
    .btn-history:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .history-list { margin-top: 8px; max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }
    .history-item { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .history-action-lbl { font-size: 0.78rem; font-weight: 700; }
    .history-meta-lbl { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

    @media (max-width: 700px) {
      .dashboard-body { flex-direction: column; }
      .info-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<!-- 로그인 -->
<div id="pageLogin">
  <div class="login-wrap">
    <h1>M.I.T.Y REUNION 관리자</h1>
    <input type="text" id="inputId" placeholder="아이디" onkeydown="if(event.key==='Enter')doLogin()"/>
    <input type="password" id="inputPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <p class="login-error" id="loginError">아이디 또는 비밀번호가 올바르지 않습니다.</p>
  </div>
</div>

<!-- 대시보드 -->
<div id="pageDashboard">
  <header>
    <h1><a href="index.html">M.I.T.Y REUNION</a> — 예매 관리</h1>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="statBooked">-</div><div class="stat-label">예매</div></div>
      <div class="stat"><div class="stat-val" id="statBlocked">-</div><div class="stat-label">예약</div></div>
      <div class="stat"><div class="stat-val" id="statAvail">-</div><div class="stat-label">잔여석/전체석</div></div>
    </div>
    <button class="btn-logout-admin" onclick="doLogout()">로그아웃</button>
  </header>

  <div class="dashboard-body">
    <div class="seat-area">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" placeholder="전화번호 뒷 4자리 또는 이메일로 검색"
          onkeydown="if(event.key==='Enter') doSearch()" />
        <button class="btn-search" onclick="doSearch()">검색</button>
        <button class="btn-search" onclick="clearSearch()" style="background:none;border-color:transparent;color:var(--muted)">✕</button>
      </div>
      <div class="seat-scroll-wrap">
        <div class="seat-inner">
          <div class="stage-label">STAGE</div>
          <div class="seat-map" id="mapB2F"></div>
          <div style="height:10px"></div>
          <div class="seat-map" id="mapB1F"></div>
        </div>
      </div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25)"></div>선택 가능</div>
        <div class="leg"><div class="leg-dot" style="background:rgba(204,34,0,0.55);border:1px solid #cc2200"></div>예매됨</div>
        <div class="leg"><div class="leg-dot" style="background:rgba(251,146,60,0.55);border:1px solid #f97316"></div>예약 좌석</div>
        <div class="leg"><div class="leg-dot" style="background:rgba(56,189,248,0.2);border:1px solid rgba(56,189,248,0.5)"></div>휠체어석</div>
        <div class="leg"><div class="leg-dot" style="background:rgba(74,222,128,0.45);border:1px solid rgba(74,222,128,0.8)"></div>티켓 수령 완료</div>
      </div>
    </div>

    <div class="info-panel">
      <p class="info-panel-title">좌석 정보</p>
      <div id="infoContent"><p class="info-empty">좌석을 클릭하면 정보가 표시됩니다</p></div>
    </div>
  </div>
</div>

<script>
  // ── 상수 ──
  const ADMIN_LOGIN_URL    = 'https://asia-northeast3-project-db5c658a-6cfe-4cbd-bb6.cloudfunctions.net/adminLogin';
  const ASSIGN_ADMIN_SEAT_URL = 'https://asia-northeast3-project-db5c658a-6cfe-4cbd-bb6.cloudfunctions.net/assignAdminSeat';

  // ── HTML 이스케이프 (XSS 방지) ──
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 관리자 인증 — adminLogin Cloud Function 경유 ──
  async function doLogin() {
    const id  = document.getElementById('inputId').value.trim();
    const pw  = document.getElementById('inputPw').value;
    const btn = document.querySelector('.btn-login');
    btn.disabled = true;
    document.getElementById('loginError').style.display = 'none';
    try {
      const res = await fetch(ADMIN_LOGIN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, password: pw }),
      });
      if (!res.ok) {
        document.getElementById('loginError').style.display = 'block';
        return;
      }
      const { token } = await res.json();
      const { signInWithCustomToken } = window._adminAuthLib;
      await signInWithCustomToken(window._adminAuth, token);
      sessionStorage.setItem('admin_auth', id);
      currentAdmin = id;
      showDashboard();
    } catch {
      document.getElementById('loginError').style.display = 'block';
    } finally {
      btn.disabled = false;
    }
  }

  function doLogout() {
    sessionStorage.removeItem('admin_auth');
    if (window._adminAuthLib && window._adminAuth) {
      window._adminAuthLib.signOut(window._adminAuth).catch(() => {});
    }
    location.reload();
  }

  window.addEventListener('load', () => {
    const waitAuth = () => new Promise(res => {
      const t = setInterval(() => { if (window._adminAuth && window._adminAuthLib) { clearInterval(t); res(); } }, 50);
    });
    waitAuth().then(() => {
      const { onAuthStateChanged } = window._adminAuthLib;
      onAuthStateChanged(window._adminAuth, async (user) => {
        if (user) {
          const tokenResult = await user.getIdTokenResult();
          if (tokenResult.claims.admin) {
            const savedName = sessionStorage.getItem('admin_auth');
            currentAdmin = savedName || user.uid.replace('admin_', '');
            showDashboard();
            return;
          }
          // 인증됐지만 admin claim 없음 — 로그아웃
          await window._adminAuthLib.signOut(window._adminAuth);
          sessionStorage.removeItem('admin_auth');
        }
        // 미인증 — 로그인 페이지 유지 (기본 CSS 상태)
      });
    });
  });

  // ── 데이터 ──
  let currentAdmin = null;
  let bookedSeats  = new Set();
  let blockedSeats = new Set();
  let blockedInfo  = {};        // seatId → { target, by }
  let bookingMap   = {};        // seatId → booking 객체
  let checkins     = {};        // seatId → { by } | true(구버전)
  const TOTAL = 7*16 + 4*12 + 4;

  async function showDashboard() {
    document.getElementById('pageLogin').style.display = 'none';
    document.getElementById('pageDashboard').style.display = 'flex';
    await loadData();
    buildMaps();
    updateStats();
  }

  async function loadData() {
    const waitDb = () => new Promise(res => {
      const t = setInterval(() => { if (window._db) { clearInterval(t); res(); } }, 50);
    });
    await waitDb();
    const { doc, getDoc, collection, query, where, getDocs } = window._fs;
    const db = window._db;

    const [resSnap, blkSnap, chkSnap, bkSnap] = await Promise.all([
      getDoc(doc(db, 'seats', 'reserved')),
      getDoc(doc(db, 'seats', 'adminBlocked')),
      getDoc(doc(db, 'seats', 'checkins')),
      getDocs(query(collection(db, 'bookings'), where('status', '==', 'confirmed'))),
    ]);

    bookedSeats  = new Set(resSnap.exists() ? (resSnap.data().list || []) : []);
    blockedSeats = new Set(blkSnap.exists() ? (blkSnap.data().list || []) : []);
    blockedInfo  = blkSnap.exists() ? (blkSnap.data().info || {}) : {};
    checkins     = chkSnap.exists() ? chkSnap.data() : {};

    bookingMap = {};
    bkSnap.forEach(d => {
      const b = d.data();
      (b.seats || []).forEach(s => { bookingMap[s] = b; });
    });
  }

  function updateStats() {
    const booked  = Object.keys(bookingMap).length;
    const blocked = [...blockedSeats].filter(s => !bookingMap[s]).length;
    const avail   = Math.max(0, TOTAL - booked - blocked);
    document.getElementById('statBooked').textContent  = booked;
    document.getElementById('statBlocked').textContent = blocked;
    document.getElementById('statAvail').textContent   = `${avail} / ${TOTAL}`;
  }

  // ── 좌석 맵 빌드 ──
  function makeAisle(label) {
    const el = document.createElement('div');
    el.className = 'seat-aisle'; el.textContent = label; return el;
  }

  function addSeat(rowEl, id, isWC = false) {
    const btn = document.createElement('button');
    let cls = 'seat' + (isWC ? ' wc-seat' : '');
    if (bookingMap[id])        cls += ' booked';
    else if (blockedSeats.has(id)) cls += ' blocked';
    if (checkins[id])          cls += ' checked-in';
    btn.className = cls;
    btn.dataset.id = id;
    btn.title = seatLabel(id);
    btn.onclick = () => selectSeat(id);
    rowEl.appendChild(btn);
  }

  function buildMaps() {
    const b2f = document.getElementById('mapB2F');
    const b1f = document.getElementById('mapB1F');
    b2f.innerHTML = ''; b1f.innerHTML = '';

    ['A','B','C','D','E','F','G'].forEach(row => {
      const rowEl = document.createElement('div'); rowEl.className = 'seat-row';
      for (let s = 1; s <= 8; s++) addSeat(rowEl, `${row}-${s}`);
      rowEl.appendChild(makeAisle(row));
      for (let s = 9; s <= 16; s++) addSeat(rowEl, `${row}-${s}`);
      b2f.appendChild(rowEl);
    });

    ['H','I','J','K'].forEach(row => {
      const rowEl = document.createElement('div'); rowEl.className = 'seat-row';
      for (let s = 1; s <= 6; s++) addSeat(rowEl, `${row}-${s}`);
      rowEl.appendChild(makeAisle(row));
      for (let s = 7; s <= 12; s++) addSeat(rowEl, `${row}-${s}`);
      b1f.appendChild(rowEl);
    });

    // L열
    const rowL = document.createElement('div'); rowL.className = 'seat-row';
    const spacer = document.createElement('div'); spacer.style.cssText = 'width:181px;flex-shrink:0;';
    rowL.appendChild(spacer);
    rowL.appendChild(makeAisle('L'));
    addSeat(rowL, 'L-WC1', true); addSeat(rowL, 'L-WC2', true);
    addSeat(rowL, 'L-1'); addSeat(rowL, 'L-2');
    b1f.appendChild(rowL);
  }

  // ── 좌석 선택 & 정보 표시 ──
  let selectedId = null;

  function seatLabel(id) {
    if (id.includes('WC')) return `L열 휠체어 ${id.replace(/[^0-9]/g,'')}`;
    return `${id.split('-')[0]}열 ${id.split('-')[1]}번`;
  }

  function selectSeat(id) {
    if (selectedId) {
      const prev = document.querySelector(`[data-id="${selectedId}"]`);
      if (prev) prev.classList.remove('selected-info');
    }
    selectedId = id;
    const btn = document.querySelector(`[data-id="${id}"]`);
    if (btn) btn.classList.add('selected-info');

    const booking    = bookingMap[id];
    const isBlocked  = blockedSeats.has(id);
    const isChecked  = !!checkins[id];
    const checkinBy  = checkins[id]?.by || null;
    const panel = document.getElementById('infoContent');
    let html = `<div class="info-seat-id">${seatLabel(id)}</div>`;

    if (booking) {
      html += `
        <div class="info-row"><span class="info-key">이메일</span><span class="info-val">${esc(booking.email) || '-'}</span></div>
        <div class="info-row"><span class="info-key">전화번호</span><span class="info-val">${fmtPhone(booking.phone)}</span></div>
        <div class="info-row"><span class="info-key">예매 좌석</span><span class="info-val">${(booking.seats||[]).map(seatLabel).join(', ')}</span></div>
        <div class="info-row"><span class="info-key">예매일시</span><span class="info-val">${fmtDate(booking.createdAt)}</span></div>
        <label class="checkin-row">
          <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCheckin('${esc(id)}', this.checked)"/>
          <span>티켓 수령 완료${checkinBy ? ` <span style="color:var(--muted);font-size:0.75rem">(${esc(checkinBy)})</span>` : ''}</span>
        </label>
        <div class="cancel-section">
          <p class="cancel-label">이 좌석 취소 (취소하려면 아래에 <strong style="color:#ff6b6b">예매취소</strong> 입력)</p>
          <input class="input-target" id="cancelInput" placeholder="예매취소" oninput="document.getElementById('btnCancelBook').disabled=this.value!=='예매취소'"/>
          <button class="btn-cancel-booking" id="btnCancelBook" disabled
            data-ref="${esc(booking.ref)}" data-seat="${esc(id)}"
            onclick="doCancelBooking(this.dataset.ref, this.dataset.seat)">이 좌석 취소</button>
        </div>`;
    } else if (isBlocked) {
      const target    = blockedInfo[id]?.target || '';
      const blockedBy = blockedInfo[id]?.by || '';
      const bEmail    = blockedInfo[id]?.email || '';
      const bPhone    = blockedInfo[id]?.phone || '';
      html += `<div style="font-size:0.8rem;color:#f97316;margin:6px 0 10px;">예약 좌석</div>`;
      if (target)    html += `<div class="info-row"><span class="info-key">대상자</span><span class="info-val">${esc(target)}</span></div>`;
      if (bEmail)    html += `<div class="info-row"><span class="info-key">이메일</span><span class="info-val">${esc(bEmail)}</span></div>`;
      if (bPhone)    html += `<div class="info-row"><span class="info-key">전화번호</span><span class="info-val">${fmtPhone(bPhone)}</span></div>`;
      if (blockedBy) html += `<div class="info-row"><span class="info-key">예약 처리</span><span class="info-val">${esc(blockedBy)}</span></div>`;
      html += `
        <label class="checkin-row">
          <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCheckin('${esc(id)}', this.checked)"/>
          <span>티켓 수령 완료${checkinBy ? ` <span style="color:var(--muted);font-size:0.75rem">(${esc(checkinBy)})</span>` : ''}</span>
        </label>
        <div class="cancel-section">
          <p class="cancel-label">예약 해제 (해제하려면 아래에 <strong style="color:#f97316">예약해제</strong> 입력)</p>
          <input class="input-target" id="unblockInput" placeholder="예약해제" oninput="document.getElementById('btnUnblock').disabled=this.value!=='예약해제'"/>
          <button class="btn-unblock" id="btnUnblock" disabled onclick="doUnblock('${esc(id)}')">예약 해제</button>
        </div>`;
    } else {
      html += `
        <div style="font-size:0.8rem;color:var(--muted);margin:6px 0 10px;">선택 가능한 좌석</div>
        <input class="input-target" id="targetInput" placeholder="대상자 이름 (선택 사항)" />
        <input class="input-target" id="targetEmail" type="email" placeholder="이메일 (선택 사항)" oninput="onAdminEmailInput(this)" />
        <div id="emailError" style="font-size:0.75rem;color:#e55;min-height:1em;margin:-4px 0 4px;"></div>
        <input class="input-target" id="targetPhone" type="tel" placeholder="전화번호 (이메일 입력 시 필수)" oninput="onAdminPhoneInput(this)" />
        <div id="phoneError" style="font-size:0.75rem;color:#e55;min-height:1em;margin:-4px 0 2px;"></div>
        <div style="font-size:0.72rem;color:var(--muted);margin:-2px 0 6px;">숫자만 입력하세요. 자동으로 형식이 완성됩니다.</div>
        <button class="btn-block" onclick="doBlock('${id}')">예약석으로 지정</button>`;
    }
    html += `<button class="btn-history" onclick="toggleHistory('${id}')">▾ 히스토리</button><div id="historyList"></div>`;
    panel.innerHTML = html;
  }

  function onAdminEmailInput(input) {
    const v = input.value.trim();
    const err = document.getElementById('emailError');
    if (!err) return;
    if (!v) { err.textContent = ''; return; }
    err.textContent = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) ? '' : '올바른 이메일 형식이 아닙니다.';
  }

  function onAdminPhoneInput(input) {
    const prev = input.dataset.prevDigits || '';
    const d = input.value.replace(/\D/g, '').slice(0, 11);
    const growing = d.length > prev.length;
    input.dataset.prevDigits = d;
    if (!d) { input.value = ''; clearPhoneError(); return; }
    const dash = (atLen) => growing && d.length === atLen ? '-' : '';
    let v;
    if (d.startsWith('02')) {
      if (d.length <= 2)      v = d + dash(2);
      else if (d.length <= 6) v = '02-' + d.slice(2) + dash(6);
      else                    v = '02-' + d.slice(2,6) + '-' + d.slice(6);
    } else if (d.startsWith('010')) {
      if (d.length <= 3)      v = d + dash(3);
      else if (d.length <= 7) v = '010-' + d.slice(3) + dash(7);
      else                    v = '010-' + d.slice(3,7) + '-' + d.slice(7);
    } else {
      if (d.length <= 3)      v = d + dash(3);
      else if (d.length <= 6) v = d.slice(0,3) + '-' + d.slice(3) + dash(6);
      else                    v = d.slice(0,3) + '-' + d.slice(3,6) + '-' + d.slice(6);
    }
    input.value = v;
    const err = document.getElementById('phoneError');
    if (err) err.textContent = (d.length >= 9) ? '' : '올바른 전화번호 형식이 아닙니다.';
  }

  function clearPhoneError() {
    const err = document.getElementById('phoneError');
    if (err) err.textContent = '';
  }

  async function doBlock(id) {
    const target   = (document.getElementById('targetInput')?.value || '').trim();
    const emailRaw = (document.getElementById('targetEmail')?.value || '').trim();
    const email    = emailRaw.toLowerCase();
    const rawPhone = (document.getElementById('targetPhone')?.value || '').trim();
    const phone    = normalizeAdminPhone(rawPhone);

    if (emailRaw && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailRaw)) {
      alert('올바른 이메일 형식이 아닙니다.'); return;
    }
    if (email && !phone) {
      alert('이메일을 입력한 경우 전화번호도 입력해주세요.'); return;
    }
    if (rawPhone && phone.replace(/\D/g,'').length < 9) {
      alert('올바른 전화번호 형식이 아닙니다.'); return;
    }
    try {
      const idToken = await window._adminAuth.currentUser.getIdToken();
      const resp = await fetch(ASSIGN_ADMIN_SEAT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
        body: JSON.stringify({ seatId: id, target, by: currentAdmin, email, phone }),
      });
      if (!resp.ok) throw new Error(await resp.text());
      blockedSeats.add(id);
      blockedInfo[id] = { target, by: currentAdmin };
      if (email) blockedInfo[id].email = email;
      if (phone) blockedInfo[id].phone = phone;
      logHistory(id, 'blocked', { target, email, phone });
      buildMaps(); updateStats(); selectSeat(id);
    } catch(e) {
      console.error('배정 실패', e);
      alert('배정 중 오류가 발생했습니다.');
    }
  }

  function normalizeAdminPhone(phone) {
    if (!phone) return '';
    const digits = phone.replace(/\D/g, '');
    if (digits.startsWith('82') && digits.length >= 11) return '0' + digits.slice(2);
    return digits;
  }

  async function doUnblock(id) {
    blockedSeats.delete(id);
    delete blockedInfo[id];
    delete checkins[id];
    const { doc, setDoc } = window._fs;
    await Promise.all([
      setDoc(doc(window._db, 'seats', 'adminBlocked'), { list: [...blockedSeats], info: blockedInfo }),
      setDoc(doc(window._db, 'seats', 'checkins'), checkins),
    ]);
    logHistory(id, 'unblocked');
    buildMaps(); updateStats(); selectSeat(id);
  }

  async function doCancelBooking(ref, seatId) {
    const { doc, updateDoc, getDoc, setDoc } = window._fs;
    const db = window._db;

    // 예약된 좌석 목록에서 해당 좌석 제거
    const resSnap = await getDoc(doc(db, 'seats', 'reserved'));
    const existing = resSnap.exists() ? (resSnap.data().list || []) : [];
    await setDoc(doc(db, 'seats', 'reserved'), { list: existing.filter(s => s !== seatId) });

    // 예매 문서에서 해당 좌석만 제거, 좌석이 모두 없어지면 전체 취소
    const bkSnap = await getDoc(doc(db, 'bookings', ref));
    if (bkSnap.exists()) {
      const bkData = bkSnap.data();
      const remaining = (bkData.seats || []).filter(s => s !== seatId);
      await updateDoc(doc(db, 'bookings', ref), {
        seats: remaining,
        ...(remaining.length === 0 ? { status: 'cancelled' } : {}),
      });
      logHistory(seatId, 'cancelled', { email: bkData.email, phone: bkData.phone });
    }

    // 체크인 제거
    delete checkins[seatId];
    await setDoc(doc(db, 'seats', 'checkins'), { ...checkins });

    await loadData();
    delete checkins[seatId];
    buildMaps(); updateStats();
    selectedId = null;
    document.getElementById('infoContent').innerHTML = '<p class="info-empty" style="color:#4ade80">취소되었습니다.</p>';
  }

  async function toggleCheckin(id, checked) {
    if (checked) checkins[id] = { by: currentAdmin };
    else delete checkins[id];
    const { doc, setDoc } = window._fs;
    await setDoc(doc(window._db, 'seats', 'checkins'), checkins);
    logHistory(id, checked ? 'checked-in' : 'checked-out');
    const btn = document.querySelector(`[data-id="${id}"]`);
    if (btn) btn.classList.toggle('checked-in', checked);
  }

  // ── 히스토리 ──
  async function logHistory(seatId, action, extra = {}) {
    const { at: atOverride, by: byOverride, ...rest } = extra;
    const entry = {
      action,
      by: byOverride !== undefined ? byOverride : currentAdmin,
      at: atOverride || new Date().toISOString(),
      ...rest,
    };
    const { doc, getDoc, setDoc } = window._fs;
    const ref = doc(window._db, 'seatHistory', seatId);
    const snap = await getDoc(ref);
    const events = snap.exists() ? (snap.data().events || []) : [];
    await setDoc(ref, { events: [...events, entry] });
  }

  async function toggleHistory(seatId) {
    const btn  = document.querySelector('.btn-history');
    const list = document.getElementById('historyList');
    if (list.dataset.loaded) {
      list.dataset.loaded = '';
      list.className = '';
      list.innerHTML = '';
      if (btn) btn.textContent = '▾ 히스토리';
      return;
    }
    if (btn) btn.textContent = '▴ 히스토리 (로딩 중...)';
    list.innerHTML = '';

    const { doc, getDoc } = window._fs;
    const snap = await getDoc(doc(window._db, 'seatHistory', seatId));
    const stored = snap.exists() ? (snap.data().events || []) : [];

    const all = [...stored];
    const booking = bookingMap[seatId];
    if (booking?.createdAt) {
      const already = stored.some(e => e.action === 'booked');
      if (!already) all.push({ action: 'booked', by: null, at: booking.createdAt, email: booking.email, phone: booking.phone });
    }
    all.sort((a, b) => (a.at < b.at ? 1 : -1));

    if (btn) btn.textContent = '▴ 히스토리';
    list.dataset.loaded = '1';

    if (all.length === 0) {
      list.innerHTML = '<p style="color:var(--muted);font-size:0.75rem;padding:8px 0">기록 없음</p>';
      return;
    }

    const labelMap = { booked:'예매됨', cancelled:'취소됨', 'checked-in':'수령 완료', 'checked-out':'수령 취소', blocked:'예약 지정', unblocked:'예약 해제' };
    const colorMap = { booked:'#cc2200', cancelled:'#ff6b6b', 'checked-in':'#4ade80', 'checked-out':'#9ca3af', blocked:'#f97316', unblocked:'#9ca3af' };

    list.className = 'history-list';
    list.innerHTML = all.map(e => `
      <div class="history-item">
        <div class="history-action-lbl" style="color:${colorMap[e.action]||'#fff'}">${labelMap[e.action]||esc(e.action)}</div>
        <div class="history-meta-lbl">${esc(e.by)||'예매자'} · ${fmtDate(e.at)}</div>
        ${e.email ? `<div style="font-size:0.65rem;color:rgba(255,255,255,0.3)">${esc(e.email)}${e.phone ? ' · ' + fmtPhone(e.phone) : ''}</div>` : ''}
      </div>`).join('');

  }

  // ── 검색 ──
  function doSearch() {
    const q = document.getElementById('searchInput').value.trim();
    clearSearchHighlight();
    if (!q) return;

    const isPhone4 = /^\d{4}$/.test(q);
    const matched = new Set();

    Object.entries(bookingMap).forEach(([seatId, b]) => {
      const phoneMatch = isPhone4 && b.phone && b.phone.slice(-4) === q;
      const emailMatch = !isPhone4 && b.email && b.email.toLowerCase().includes(q.toLowerCase());
      if (phoneMatch || emailMatch) matched.add(seatId);
    });

    if (matched.size === 0) {
      alert('검색 결과가 없습니다.');
      return;
    }

    matched.forEach(id => {
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) el.classList.add('search-match');
    });

    // 첫 번째 결과로 스크롤 & 선택
    const firstId = [...matched][0];
    const firstEl = document.querySelector(`[data-id="${firstId}"]`);
    if (firstEl) {
      firstEl.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
      selectSeat(firstId);
    }
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    clearSearchHighlight();
  }

  function clearSearchHighlight() {
    document.querySelectorAll('.seat.search-match').forEach(el => el.classList.remove('search-match'));
  }

  // ── 유틸 ──
  function fmtPhone(p) {
    if (!p) return '-';
    return p.replace(/(\d{3})(\d{3,4})(\d{4})/, '$1-$2-$3');
  }
  function fmtDate(iso) {
    if (!iso) return '-';
    return iso.slice(0,16).replace('T',' ');
  }
</script>
</body>
